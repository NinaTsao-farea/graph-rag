# 檔案二：GraphRAG 切換配置
# 注意：此檔案需放置於 ragtest/settings.yaml
llm:
  type: openai_chat
  # 2026 年最新 Gemini 格式
  model: gemini/gemini-1.5-flash
  api_key: ${GRAPHRAG_API_KEY}
  api_base: https://generativelanguage.googleapis.com/v1beta/openai/
  max_tokens: 4000
  temperature: 0.1

embeddings:
  llm:
    type: openai_embedding
    model: gemini/text-embedding-004
    api_key: ${GRAPHRAG_API_KEY}
    api_base: https://generativelanguage.googleapis.com/v1beta/openai/

chunks:
  size: 1200 # 針對標案長條款調大 Chunk
  overlap: 200

# 圖譜萃取設定 (3.0.6 特有)
entity_extraction:
  entity_types: [organization, person, law, budget, technology, requirement]
  max_gleanings: 1
